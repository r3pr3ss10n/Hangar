services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hangar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hangar}
      POSTGRES_DB: ${POSTGRES_DB:-hangar}
    volumes:
      # Postgres 18+ images store data in a version-specific subdir and expect
      # the mount at /var/lib/postgresql (not the old .../data path).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hangar} -d ${POSTGRES_DB:-hangar}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backenddata:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the static SPA at build time (browser-visible API origin).
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  backenddata:
