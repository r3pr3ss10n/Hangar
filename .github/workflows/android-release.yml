name: Android Release

# Build and publish a signed release APK whenever the android/ folder changes
# on master. The path filter keeps backend/frontend-only commits from triggering
# an Android build.
on:
  push:
    branches: [master]
    paths:
      - "android/**"

# Allow the workflow to create releases and upload assets.
permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          path="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$path" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          echo "path=android/$path" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Android build ${{ github.run_number }}
          body: |
            Automated release APK from commit ${{ github.sha }}.
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
